<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Cabeçalho */
        header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }

        .btn-delete {
            background-color: #e74c3c;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        .btn-lido {
            background-color: #2ecc71;
        }

        .btn-lido:hover {
            background-color: #27ae60;
        }

        /* Cards de livros */
        .livro {
            background: white;
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .livro:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .livro-info {
            flex: 2;
        }

        .livro-titulo {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .livro-autor {
            color: #7f8c8d;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .livro-actions {
            display: flex;
            gap: 10px;
        }

        /* Cores de status */
        .lido {
            border-left: 6px solid #2ecc71;
            background-color: #f0fff4;
        }

        .nao-lido {
            border-left: 6px solid #f39c12;
            background-color: #fffaf0;
        }

        /* Formulário */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .form-card form p {
            margin-bottom: 20px;
        }

        .form-card label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .form-card input, 
        .form-card textarea, 
        .form-card select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .form-card input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
        }

        button[type="submit"] {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        hr {
            margin: 20px 0;
            border: none;
            height: 1px;
            background: linear-gradient(to right, #ddd, transparent);
        }

        @media (max-width: 700px) {
            .livro {
                flex-direction: column;
                align-items: flex-start;
            }
            .livro-actions {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Gerenciador de Biblioteca</h1>
            <div class="nav-buttons">
                <a href="{% url 'listar_livros' %}" class="btn">📖 Listar Livros</a>
                <a href="{% url 'adicionar_livro' %}" class="btn">➕ Adicionar Livro</a>
            </div>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
